<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:#fff;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
animation:muncul .8s;
}

h1{
color:#ff2d75;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.6;
color:#444;
margin-bottom:25px;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#ff2d75;
color:#fff;
}

#yes:hover{
transform:scale(1.08);
}

#no{
background:#ddd;
}

@keyframes muncul{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

.hearts{
position:absolute;
font-size:25px;
animation:naik 5s linear forwards;
}

@keyframes naik{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

.fade{
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div id="konten" class="card">

<h1>Hai Viana Cantik ❤️</h1>

<p>
Aku punya satu pertanyaan penting...<br><br>
 di malam ini yg mungkin agak aneh gk seperti orang orang aku mau  Menjadi bagian hidup kmu , kita bngun komitmen menjalani hubungan untuk serius Maukah kamu menjadi seseorang yang spesial di hatiku?
</p>

<button id="yes">💖 Mau</button>
<button id="no">🙈 Tidak</button>

</div>

<audio id="musik" loop>
<source src="https://raw.githubusercontent.com/bangdonn01/Musiku/main/lagu.mp3" type="audio/mpeg">
</audio>

<script>

const yes=document.getElementById("yes");
const no=document.getElementById("no");
const musik=document.getElementById("musik");
const konten=document.getElementById("konten");

// Tombol tidak kabur
no.addEventListener("mouseover",()=>{
no.style.position="absolute";
no.style.left=Math.random()*80+"%";
no.style.top=Math.random()*80+"%";
});

// Tombol mau
yes.addEventListener("click",()=>{

musik.play();

konten.classList.add("fade");

setTimeout(()=>{

konten.innerHTML=`

<h1>💖Resmi yahh hehe💖</h1>

<p style="font-size:22px;">
Mulai hari ini...<br><br>

<b>01 Juli 2026</b><br><br>

Terima kasih sudah menerima aku ❤️<br><br>

Semoga kita selalu saling menjaga, 
saling mendukung, saling support, menjaga komitmen kita dan semoga kita selalu bersma menjalani kehidupan pnuh tawa
dan kebahagiaan selamanya 🤍
mari membangun cerita baru Viana 💝
</p>

<h2>❤️ I Love You ❤️</h2>

`;

},700);

});

// Hati berjatuhan
setInterval(()=>{

let hati=document.createElement("div");
hati.className="hearts";
hati.innerHTML="❤️";
hati.style.left=Math.random()*100+"vw";
hati.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(hati);

setTimeout(()=>{
hati.remove();
},5000);

},300);

</script>

</body>
</html>
